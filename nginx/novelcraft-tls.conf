# Nginx reverse proxy for NovelCraft — TLS-enabled production config
# Place at /etc/nginx/sites-available/novelcraft and symlink to sites-enabled
#
# Certificate setup (Let's Encrypt):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com
#
# Self-signed (development only):
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/novelcraft.key \
#     -out /etc/nginx/ssl/novelcraft.crt

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # TLS configuration
    ssl_certificate     /etc/nginx/ssl/novelcraft.crt;
    ssl_certificate_key /etc/nginx/ssl/novelcraft.key;

    # Modern TLS settings (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (uncomment in production after verifying TLS works)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Frontend static files
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # API backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_buffering off;  # SSE support
        client_max_body_size 50m;
    }

    # Health check — no auth
    location /api/v1/healthz {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # Gzip
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;
    gzip_min_length 256;
}

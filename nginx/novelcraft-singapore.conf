# Host nginx on the Singapore VPS (43.156.17.78) — public TLS terminator.
# Place at /etc/nginx/sites-available/novelcraft, symlink into sites-enabled,
# then `nginx -t && systemctl reload nginx`.
#
# Topology:  browser --HTTPS(443)--> this nginx --HTTP--> 127.0.0.1:8090 (compose frontend)
#            compose frontend serves the static UI and proxies /api -> api:8000.
#
# Ports on this host: xray holds 80 / 8080 / 8443; 443 is free and used here.
# Because 80 is taken by xray, obtain the certificate with a DNS-01 challenge
# (see the deploy manual), not HTTP-01.
#
# Replace app.example.com with your real hostname and point its A record at
# 43.156.17.78 before enabling.

server {
    listen 443 ssl http2;
    server_name app.example.com;

    ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Don't leak the nginx version (BUG-011).
    server_tokens off;

    # Security headers (BUG-008 / BUG-012). The SPA loads only same-origin JS
    # (the SW registration was moved out of an inline <script>), so script-src can
    # stay 'self'. style-src keeps 'unsafe-inline' because React uses element style
    # attributes; connect-src 'self' covers the same-origin /api fetch + SSE.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Streaming: /api/v1/**/stream (SSE) and run_events must not be buffered,
        # and the read timeout must exceed the 600s run_events cap.
        proxy_buffering off;
        proxy_read_timeout 650s;
    }
}

# NOTE: no `listen 80` redirect here because xray owns port 80 on this host.
# If you later free port 80, add:
#   server { listen 80; server_name app.example.com; return 301 https://$host$request_uri; }

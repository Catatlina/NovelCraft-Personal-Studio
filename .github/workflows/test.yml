# NovelCraft CI — run tests on push to main
name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: {POSTGRES_USER: novelcraft, POSTGRES_PASSWORD: novelcraft, POSTGRES_DB: test}
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Run migrations
        run: cd backend && alembic upgrade head
        env: {DATABASE_URL: postgresql://novelcraft:novelcraft@localhost/test}
      - name: Verify migration round trip
        run: |
          PGPASSWORD=novelcraft createdb -h localhost -U novelcraft migration_roundtrip
          cd backend
          DATABASE_URL=postgresql://novelcraft:novelcraft@localhost/migration_roundtrip alembic upgrade head
          DATABASE_URL=postgresql://novelcraft:novelcraft@localhost/migration_roundtrip alembic downgrade base
      - name: Run tests
        run: cd backend && pytest tests/ -v
        # Real-provider T3 tests run only when the DEEPSEEK_API_KEY repo secret
        # is configured; without it they self-skip (forks never see secrets).
        env: {DATABASE_URL: postgresql://novelcraft:novelcraft@localhost/test, REDIS_URL: redis://localhost:6379/0, NOVELCRAFT_ENV: ci, DEEPSEEK_API_KEY: "${{ secrets.DEEPSEEK_API_KEY }}"}
      - name: Dependency audit
        run: pip install pip-audit && pip-audit -r backend/requirements.txt
      - name: Verify AI truthfulness gate
        run: python scripts/verify_ai_truthfulness.py
      - name: Verify delivery claims
        run: python scripts/verify_delivery_claims.py
      - name: Validate prompt golden-case definitions
        run:           PYTHONPATH=backend python -c "from app.services.fusion_deep import run_golden_case_ci; r=run_golden_case_ci(); print(r); assert r['definition_invalid'] == 0 and r['provider_outputs_verified'] == 0"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install SAST tools
        run: pip install bandit semgrep
      - name: Bandit (Python SAST — fail on HIGH)
        # P3-T4 / G11: CI 跑 SAST。对历史存量高危先以 continue-on-error 暴露而不阻断
        # 既有流水线；新代码应保证 bandit -s high 零高危。基线排除 tests/alembic/scripts。
        run: bandit -r backend/app -c .bandit -s high
        continue-on-error: true
      - name: Semgrep (best-effort, requires SEMGREP_APP_TOKEN)
        if: ${{ env.SEMGREP_APP_TOKEN != '' }}
        env: {SEMGREP_APP_TOKEN: "${{ secrets.SEMGREP_APP_TOKEN }}"}
        run: semgrep ci
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: "20"}
      - name: Install & build
        run: cd frontend && npm ci && npm run build
      - name: Dependency audit
        run: cd frontend && npm audit --omit=dev --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: {POSTGRES_USER: novelcraft, POSTGRES_PASSWORD: novelcraft, POSTGRES_DB: test}
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      DATABASE_URL: postgresql://novelcraft:novelcraft@localhost/test
      REDIS_URL: redis://localhost:6379/0
      # protected 用例（AI 分析→建书）仅在 repo secret 存在时执行，否则自动 skip
      DEEPSEEK_API_KEY: "${{ secrets.DEEPSEEK_API_KEY }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - uses: actions/setup-node@v4
        with: {node-version: "20"}
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Run migrations
        run: cd backend && alembic upgrade head
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps
      - name: Run E2E
        run: cd frontend && npx playwright test
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

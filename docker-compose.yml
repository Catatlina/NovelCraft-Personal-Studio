# NovelCraft Personal Studio — Docker Compose (M1)
# Usage: docker compose up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: pgvector/pgvector:pg16
    logging: *default-logging
    environment:
      POSTGRES_USER: novelcraft
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novelcraft}
      POSTGRES_DB: novelcraft
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novelcraft"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    logging: *default-logging
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    logging: *default-logging
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://novelcraft:${POSTGRES_PASSWORD:-novelcraft}@postgres/novelcraft
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      NOVELCRAFT_ENV: ${NOVELCRAFT_ENV:-development}
      NOVELCRAFT_JWT_SECRET: ${NOVELCRAFT_JWT_SECRET:-}
      NOVELCRAFT_CREDENTIALS_KEY: ${NOVELCRAFT_CREDENTIALS_KEY:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      TOKEN_BLACKLIST_FAIL_CLOSED: ${TOKEN_BLACKLIST_FAIL_CLOSED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build: ./backend
    logging: *default-logging
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://novelcraft:${POSTGRES_PASSWORD:-novelcraft}@postgres/novelcraft
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      NOVELCRAFT_ENV: ${NOVELCRAFT_ENV:-development}
      NOVELCRAFT_JWT_SECRET: ${NOVELCRAFT_JWT_SECRET:-}
      NOVELCRAFT_CREDENTIALS_KEY: ${NOVELCRAFT_CREDENTIALS_KEY:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TOKEN_BLACKLIST_FAIL_CLOSED: ${TOKEN_BLACKLIST_FAIL_CLOSED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app

  flower:
    image: mher/flower:2.0
    command:
      - celery
      - --broker=redis://redis:6379/0
      - flower
      - --port=5555
      - --basic_auth=${FLOWER_USER:?Set FLOWER_USER}:${FLOWER_PASSWORD:?Set FLOWER_PASSWORD}
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    logging: *default-logging
    ports:
      - "80:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Runs to completion before api/worker start (they depend on it)
  migrate:
    build: ./backend
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://novelcraft:${POSTGRES_PASSWORD:-novelcraft}@postgres/novelcraft
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # Daily pg_dump with 7-day retention (C-ops backup baseline)
  backup:
    image: pgvector/pgvector:pg16
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          PGPASSWORD=$${POSTGRES_PASSWORD:-novelcraft} pg_dump -h postgres -U novelcraft novelcraft \
            | gzip > /backups/novelcraft-$$(date +%Y%m%d-%H%M%S).sql.gz \
            && echo "backup done: $$(date)" \
            || echo "backup FAILED: $$(date)"
          ls -1t /backups/novelcraft-*.sql.gz 2>/dev/null | tail -n +8 | xargs -r rm -f
          sleep 86400
        done
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novelcraft}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

volumes:
  pg_data:
  redis_data:

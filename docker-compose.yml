# NovelCraft Personal Studio — Docker Compose (M1)
# Usage: docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: novelcraft
      POSTGRES_PASSWORD: novelcraft
      POSTGRES_DB: novelcraft
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novelcraft"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://novelcraft:novelcraft@postgres/novelcraft
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      NOVELCRAFT_ENV: ${NOVELCRAFT_ENV:-development}
      NOVELCRAFT_JWT_SECRET: ${NOVELCRAFT_JWT_SECRET:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      TOKEN_BLACKLIST_FAIL_CLOSED: ${TOKEN_BLACKLIST_FAIL_CLOSED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://novelcraft:novelcraft@postgres/novelcraft
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      NOVELCRAFT_ENV: ${NOVELCRAFT_ENV:-development}
      NOVELCRAFT_JWT_SECRET: ${NOVELCRAFT_JWT_SECRET:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TOKEN_BLACKLIST_FAIL_CLOSED: ${TOKEN_BLACKLIST_FAIL_CLOSED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  flower:
    image: mher/flower:2.0
    command:
      - celery
      - --broker=redis://redis:6379/0
      - flower
      - --port=5555
      - --basic_auth=${FLOWER_USER:?Set FLOWER_USER}:${FLOWER_PASSWORD:?Set FLOWER_PASSWORD}
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Run once to migrate DB
  migrate:
    build: ./backend
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://novelcraft:novelcraft@postgres/novelcraft
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pg_data:
